# AutoTeam Configuration Example
# Copy this file to autoteam.yaml and customize

# Worker definitions - map roles to CLI tools
workers:
  claude:
    vendor: claude
    role: analyst
    executable: claude  # or full path
    timeout_seconds: 120
    max_retries: 2
    extra_args: []
    # env_vars:
    #   ANTHROPIC_API_KEY: "..."

  copilot:
    vendor: copilot
    role: reviewer
    executable: copilot
    timeout_seconds: 120
    max_retries: 2

# Judge configuration - AI that makes decisions
judge:
  provider: deepseek  # deepseek, claude, openai
  model: deepseek-chat
  # api_key_env: DEEPSEEK_API_KEY  # environment variable name
  temperature: 0.1
  timeout_seconds: 60

# Safety guardrails
guardrails:
  max_rounds: 5
  max_retries_per_worker: 2
  max_total_runtime_seconds: 600
  max_cost_usd: 1.0
  block_code_execution: true

# Workflow definitions
workflows:
  review:
    description: "Code review workflow - Claude analyzes, Copilot reviews"
    worker_sequence:
      - claude
      - copilot
    initial_worker: claude
    allow_parallel: false

  analysis:
    description: "Deep analysis workflow"
    worker_sequence:
      - claude
    initial_worker: claude

# Default workflow to use
default_workflow: review
